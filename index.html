<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Aventura das Notas - Violino</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Trebuchet MS', sans-serif;
    touch-action: manipulation;
    overscroll-behavior: none;
    position: fixed;
    width: 100%;
  }
  body {
    background: linear-gradient(180deg, #ffd194 0%, #70e1f5 100%);
    display: flex;
    justify-content: center;
    align-items: stretch;
    /* Layered fallbacks: --vh (JS) -> dvh (modern) -> vh (legacy) */
    height: calc(var(--vh, 1vh) * 100);
    height: 100dvh;
  }
  .game {
    width: 100%;
    max-width: 520px;
    height: calc(var(--vh, 1vh) * 100);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    background: linear-gradient(180deg, #fff7e0 0%, #ffe4c0 100%);
    box-shadow: 0 0 30px rgba(0,0,0,0.15);
    /* Respect iOS safe areas (notch, home indicator) */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: linear-gradient(90deg, #ff9a76 0%, #ffb88c 100%);
    color: white;
    font-weight: bold;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    z-index: 5;
    flex-shrink: 0;
  }
  .header > div { display: flex; align-items: center; gap: 6px; font-size: 16px; }
  .hearts { font-size: 22px; letter-spacing: 2px; }
  .heart-empty { opacity: 0.25; }
  .level-badge {
    background: white;
    color: #ff7043;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 14px;
  }
  .mute-btn {
    background: rgba(255,255,255,0.3);
    border: none;
    color: white;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== STAFF AREA ===== */
  .staff-area {
    flex: 1 1 auto;
    min-height: 0; /* critical: lets the flex item shrink below its content size */
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: linear-gradient(180deg, #fff8e8 0%, #fff0d4 100%);
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .feedback-flash {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .feedback-flash.correct { background: rgba(76, 175, 80, 0.35); opacity: 1; }
  .feedback-flash.wrong { background: rgba(244, 67, 54, 0.35); opacity: 1; }

  .feedback-text {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 42px;
    font-weight: bold;
    pointer-events: none;
    opacity: 0;
    transition: all 0.3s ease-out;
    text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
    z-index: 4;
  }
  .feedback-text.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .feedback-text.correct { color: #2e7d32; }
  .feedback-text.wrong { color: #c62828; }

  /* ===== BUTTONS ===== */
  .buttons {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    padding: 8px 6px 10px;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.05) 100%);
    flex-shrink: 0;
  }
  .note-btn {
    border: none;
    border-radius: 12px;
    /* Responsive button height: ~9% of viewport, but capped */
    height: clamp(48px, 9vh, 72px);
    padding: 0;
    font-size: clamp(13px, 4.2vw, 17px);
    font-weight: bold;
    color: white;
    cursor: pointer;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    box-shadow: 0 4px 0 rgba(0,0,0,0.2), inset 0 -2px 4px rgba(0,0,0,0.15);
    transition: transform 0.08s, box-shadow 0.08s;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .note-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.2), inset 0 -2px 4px rgba(0,0,0,0.15);
  }
  .note-btn[data-note="do"]  { background: linear-gradient(180deg, #ef5350, #c62828); }
  .note-btn[data-note="re"]  { background: linear-gradient(180deg, #ff9800, #e65100); }
  .note-btn[data-note="mi"]  { background: linear-gradient(180deg, #fdd835, #f9a825); color: #5d4037; text-shadow: 1px 1px 2px rgba(255,255,255,0.4); }
  .note-btn[data-note="fa"]  { background: linear-gradient(180deg, #66bb6a, #2e7d32); }
  .note-btn[data-note="sol"] { background: linear-gradient(180deg, #29b6f6, #0277bd); }
  .note-btn[data-note="la"]  { background: linear-gradient(180deg, #5c6bc0, #283593); }
  .note-btn[data-note="si"]  { background: linear-gradient(180deg, #ab47bc, #6a1b9a); }

  /* ===== SCREENS ===== */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
    z-index: 10;
    background: linear-gradient(180deg, #fff7e0ee 0%, #ffe4c0ee 100%);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    overflow-y: auto;
  }
  .screen.hidden { display: none; }
  .screen h1 {
    font-size: clamp(24px, 7vw, 36px);
    color: #ff5722;
    margin-bottom: 8px;
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(0,0,0,0.1);
  }
  .screen h2 { font-size: clamp(16px, 5vw, 22px); color: #5d4037; margin-bottom: 12px; }
  .screen p { font-size: clamp(13px, 3.8vw, 16px); color: #6d4c41; margin-bottom: 8px; line-height: 1.4; }
  .screen .big-score {
    font-size: clamp(40px, 13vw, 64px);
    color: #ff7043;
    font-weight: bold;
    margin: 8px 0;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.1);
  }
  .play-btn {
    margin-top: 14px;
    padding: 14px 32px;
    font-size: clamp(16px, 5vw, 22px);
    font-weight: bold;
    color: white;
    background: linear-gradient(180deg, #66bb6a, #2e7d32);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.2), 0 8px 16px rgba(0,0,0,0.15);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    transition: transform 0.08s, box-shadow 0.08s;
    font-family: inherit;
  }
  .play-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.15);
  }
  .legend {
    margin-top: 12px;
    background: rgba(255,255,255,0.6);
    border-radius: 14px;
    padding: 10px 16px;
    font-size: clamp(12px, 3.5vw, 14px);
    color: #5d4037;
    line-height: 1.5;
    max-width: 380px;
  }
  .legend strong { color: #ff5722; }

  /* ===== CLEF SELECTION ===== */
  .clef-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 12px 0 4px;
    width: 100%;
    max-width: 320px;
  }
  .clef-btn {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 18px;
    background: linear-gradient(180deg, #ffb74d, #f57c00);
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 16px;
    font-family: inherit;
    font-weight: bold;
    font-size: clamp(15px, 4.5vw, 19px);
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.2), 0 6px 12px rgba(0,0,0,0.1);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.25);
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .clef-btn:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.2), 0 3px 6px rgba(0,0,0,0.1);
  }
  .clef-btn[data-clef="fa"]  { background: linear-gradient(180deg, #4fc3f7, #0277bd); }
  .clef-btn[data-clef="do"]  { background: linear-gradient(180deg, #ba68c8, #6a1b9a); }
  .clef-symbol {
    font-size: clamp(34px, 9vw, 44px);
    font-family: 'Bravura Text', 'Noto Music', 'Apple Symbols', serif;
    line-height: 1;
    min-width: 38px;
    text-align: center;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.18);
  }
  .clef-name { flex: 1; text-align: left; }

  .end-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 14px;
  }
  .play-btn-secondary {
    background: linear-gradient(180deg, #78909c, #455a64);
    font-size: clamp(13px, 4vw, 17px);
    padding: 12px 24px;
    margin-top: 0;
  }

  .mascot {
    font-size: clamp(44px, 14vw, 70px);
    margin-bottom: 6px;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-12px) rotate(3deg); }
  }

  /* Tighter layout on very short screens (landscape phones, small devices) */
  @media (max-height: 560px) {
    .header { padding: 4px 10px; }
    .header > div { font-size: 13px; }
    .hearts { font-size: 18px; }
    .level-badge { font-size: 12px; padding: 2px 8px; }
    .mute-btn { width: 28px; height: 28px; font-size: 14px; }
    .note-btn { height: clamp(40px, 13vh, 56px); font-size: 13px; }
    .buttons { padding: 4px 4px 6px; gap: 3px; }
    .legend { display: none; }
  }
  @media (max-height: 480px) {
    .screen h1 { margin-bottom: 4px; }
    .screen h2 { margin-bottom: 6px; }
    .screen p { margin-bottom: 4px; }
    .mascot { animation: none; }
  }
</style>
</head>
<body>
<div class="game">

  <!-- HEADER -->
  <div class="header" id="header" style="display:none">
    <div>⭐ <span id="score">0</span></div>
    <div class="hearts" id="hearts">❤❤❤</div>
    <div class="level-badge">Nível <span id="level">1</span></div>
    <button class="mute-btn" id="muteBtn" aria-label="Som">🔊</button>
  </div>

  <!-- STAFF AREA -->
  <div class="staff-area" id="staffArea" style="display:none">
    <canvas id="canvas"></canvas>
    <div class="feedback-flash" id="flash"></div>
    <div class="feedback-text" id="feedbackText"></div>
  </div>

  <!-- BUTTONS -->
  <div class="buttons" id="buttons" style="display:none">
    <button class="note-btn" data-note="do">Dó</button>
    <button class="note-btn" data-note="re">Ré</button>
    <button class="note-btn" data-note="mi">Mi</button>
    <button class="note-btn" data-note="fa">Fá</button>
    <button class="note-btn" data-note="sol">Sol</button>
    <button class="note-btn" data-note="la">Lá</button>
    <button class="note-btn" data-note="si">Si</button>
  </div>

  <!-- START SCREEN -->
  <div class="screen" id="startScreen">
    <div class="mascot">🎻</div>
    <h1>Aventura das Notas</h1>
    <h2>Escolha a clave!</h2>
    <div class="clef-options">
      <button class="clef-btn" data-clef="sol">
        <span class="clef-symbol">𝄞</span>
        <span class="clef-name">Clave de Sol</span>
      </button>
      <button class="clef-btn" data-clef="fa">
        <span class="clef-symbol">𝄢</span>
        <span class="clef-name">Clave de Fá</span>
      </button>
      <button class="clef-btn" data-clef="do">
        <span class="clef-symbol">𝄡</span>
        <span class="clef-name">Clave de Dó</span>
      </button>
    </div>
    <div class="legend">
      <strong>Como jogar:</strong><br>
      🎵 Veja a nota chegar pela direita<br>
      👆 Aperte o botão da nota correta<br>
      ⚡ A velocidade aumenta conforme você acerta<br>
      ❤ Você tem 3 vidas — não erre demais!
    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div class="screen hidden" id="endScreen">
    <div class="mascot" id="endMascot">🎉</div>
    <h1 id="endTitle">Parabéns!</h1>
    <p id="endMessage">Você foi muito bem!</p>
    <div class="big-score" id="finalScore">0</div>
    <p>Nível alcançado: <strong id="finalLevel">1</strong> · Clave: <strong id="finalClef">Sol</strong></p>
    <div class="end-buttons">
      <button class="play-btn play-btn-secondary" id="changeClefBtn">Trocar clave 🎼</button>
      <button class="play-btn" id="restartBtn">Jogar de novo 🔄</button>
    </div>
  </div>

</div>

<script src="game.js"></script>
</body>
</html>
